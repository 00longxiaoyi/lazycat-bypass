<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1600" viewBox="0 0 900 1600" role="img" aria-labelledby="title desc">
  <title id="title">Shadowrocket 创建独立节点示例</title>
  <desc id="desc">展示在 Shadowrocket 中通过扫描二维码或复制链接创建 lazycat 独立 SOCKS 节点的竖屏说明图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#9a3412" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="900" height="1600" fill="url(#bg)"/>
  <circle cx="770" cy="145" r="150" fill="#fed7aa" opacity="0.55"/>
  <circle cx="110" cy="1460" r="210" fill="#fdba74" opacity="0.28"/>
  <g filter="url(#shadow)">
    <rect x="80" y="92" width="740" height="1416" rx="42" fill="#ffffff"/>
    <rect x="80" y="92" width="740" height="76" rx="42" fill="#f3f4f6"/>
    <circle cx="132" cy="130" r="12" fill="#fb7185"/>
    <circle cx="170" cy="130" r="12" fill="#fbbf24"/>
    <circle cx="208" cy="130" r="12" fill="#34d399"/>
    <text x="450" y="140" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#431407">Shadowrocket 创建独立节点</text>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="130" y="270" font-size="42" font-weight="900" fill="#1f2937">第 1 步</text>
    <text x="130" y="328" font-size="38" font-weight="900" fill="#1f2937">创建 lazycat 独立节点</text>
    <text x="130" y="386" font-size="24" fill="#6b7280">使用二维码或链接导入 SOCKS 节点。</text>
    <g transform="translate(130 475)">
      <rect width="640" height="520" rx="34" fill="#f9fafb" stroke="#fed7aa" stroke-width="5"/>
      <rect x="160" y="62" width="320" height="320" rx="24" fill="#111827"/>
      <rect x="198" y="100" width="70" height="70" fill="#fff"/>
      <rect x="292" y="100" width="34" height="34" fill="#fff"/>
      <rect x="352" y="100" width="92" height="70" fill="#fff"/>
      <rect x="198" y="198" width="44" height="44" fill="#fff"/>
      <rect x="270" y="198" width="126" height="44" fill="#fff"/>
      <rect x="424" y="198" width="46" height="46" fill="#fff"/>
      <rect x="198" y="286" width="96" height="48" fill="#fff"/>
      <rect x="326" y="286" width="44" height="48" fill="#fff"/>
      <rect x="402" y="286" width="68" height="48" fill="#fff"/>
      <text x="320" y="448" text-anchor="middle" font-size="30" font-weight="800" fill="#9a3412">扫描页面二维码</text>
    </g>
    <g transform="translate(130 1060)">
      <rect width="640" height="250" rx="34" fill="#f9fafb" stroke="#fed7aa" stroke-width="5"/>
      <text x="46" y="70" font-size="28" font-weight="900" fill="#1f2937">节点信息</text>
      <rect x="46" y="100" width="548" height="62" rx="16" fill="#ffedd5"/>
      <text x="72" y="140" font-size="25" font-weight="800" fill="#9a3412">SOCKS / lazycat</text>
      <text x="46" y="204" font-size="24" fill="#6b7280">地址：127.0.0.1　端口：31086</text>
    </g>
    <g transform="translate(130 1370)">
      <rect width="640" height="78" rx="22" fill="#ffedd5"/>
      <text x="32" y="34" font-size="21" fill="#9a3412">也可以点击页面按钮复制链接，</text>
      <text x="32" y="62" font-size="21" fill="#9a3412">再粘贴到 Shadowrocket 中导入。</text>
    </g>
  </g>
</svg>
